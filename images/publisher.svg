<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3f3f46"/>
      <stop offset="1" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <!-- O ring -->
  <circle cx="128" cy="128" r="50" fill="none" stroke="url(#green)" stroke-width="26"/>
  <!-- slash (rising, extends past ring like the wordmark) -->
  <line x1="78" y1="180" x2="178" y2="76" stroke="url(#green)" stroke-width="22" stroke-linecap="round"/>
</svg>
